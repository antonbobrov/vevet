<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · LEZvwOv</title>
        <style>body {
  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.carousel {
  --size: max(30vw, 30vh);

  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: var(--size);
  height: calc(var(--size) * 0.675);

  opacity: 0;
  transition: opacity 0.25s linear;

  transform-style: preserve-3d;
  perspective: calc(var(--size) * 2.5);
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0px 0px 50px 0px rgba(0, 0, 0, 0.1);
}

.slide img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">
    <img src="https://picsum.photos/id/757/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/59/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/400/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/260/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/358/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/478/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/625/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/356/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/380/600/900" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/652/600/900" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  clamp
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  direction: "horizontal",
  origin: "center",
  loop: false,
  gap: 20,
  grabCursor: true
});

carousel.on("update", (data, {
  slides
}) => {
  slides.forEach(({
    element,
    size,
    progress,
    coord
  }) => {
    const x = progress > 0 ? 0 : coord;
    const z = progress < 0 ? 0 : size * progress * -1;
    const brightness = clamp(1 - progress * 0.5);

    element.style.transform = `translateX(${x}px) translateZ(${z}px)`;
    element.style.filter = `brightness(${brightness})`;
  });
});

container.classList.add("ready");

  </script>
      </body>
    </html>
