<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNNbKXE</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  position: relative;
  width: 200px;
  height: 200px;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="container" id="container"></div>
</div>
        
  <script type="module">
import {
  Canvas
} from "https://esm.sh/vevet@5";

const instance = new Canvas({
  container: document.getElementById("container")
});

const render = ({
  ctx,
  width,
  height
}) => {
  ctx.beginPath();
  ctx.fillStyle = "#f8f9ff";
  ctx.fillRect(0, 0, width, height);
  ctx.closePath();

  ctx.beginPath();
  ctx.fillStyle = "#0D6EFD";
  ctx.fillRect(10, 10, 50, 50);
  ctx.closePath();
};

instance.render(render);
instance.on("resize", () => instance.render(render));

  </script>
      </body>
    </html>
