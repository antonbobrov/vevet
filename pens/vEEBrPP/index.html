<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · vEEBrPP</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>#quote {
  width: 20em;
  max-width: 100%;
  line-height: 1.2;
  text-align: center;
  font-kerning: none;

  opacity: 0;

  .v-split-text__line-wrapper {
    overflow: hidden;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="quote">
    Vevet SplitText is a free utility that enables seamless text splitting
    into words, letters, or lines as needed.
  </div>

  <button type="button" id="animate" class="btn">Animate</button>
</div>
        
  <script type="module">
import {
  SplitText
} from "https://esm.sh/vevet@5";
import {
  animate,
  stagger
} from "https://esm.sh/animejs@4";

let tl;
const container = document.getElementById("quote");

const splitText = new SplitText({
  container,
  lines: true,
  linesWrapper: true,
  letters: false,
  onSplit: (data, {
    lines
  }) => {
    container.style.opacity = "1";

    tl = animate(lines, {
      duration: 800,
      opacity: {
        from: 0,
        to: 1
      },
      ease: "outSine",
      delay: stagger(500),
      y: {
        from: "100%",
        to: 0
      }
    });

  }
});

document.getElementById("animate").onclick = function() {
  tl?.restart();
};

  </script>
      </body>
    </html>
