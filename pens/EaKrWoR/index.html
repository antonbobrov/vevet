<!DOCTYPE html>

        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;

#preloader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3vw;

.button {
  height: 48px;
  padding: 0 32px;
  border: 0;
  cursor: pointer;

  background: linear-gradient(135deg,
      rgb(13, 110, 253) 0%,
      rgb(140, 122, 230) 50%,
      rgb(0, 201, 177) 100%);
  background-size: 200% auto;
  box-shadow: 0 4px 20px rgba(13, 110, 253, 0.1);
  border-radius: 50vw;

  font: inherit;
  font-size: 24px;
  color: currentColor;

  transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  opacity: 0;
  pointer-events: none;

  &.show {
    opacity: 1;
    pointer-events: all;
  }
}

.button:hover {
  background-position: right center;
}

.grid {
  width: 100%;
  min-height: 100vh;
  padding: 3vw;
  box-sizing: border-box;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 2vw;

  img {
    display: block;
    width: 30%;
    height: auto;
    border-radius: 10px;
  }
}</style>
      </head>
      <body>
        <div id="preloader">
  <div id="progress">00%</div>

  <button id="hide-preloader" type="button" class="button">
    Hide Preloader
  </button>
</div>

<div class="grid">

  <script type="module">
import {
  ProgressPreloader,
  clamp
} from "https://esm.sh/vevet@5";

const progressElement = document.getElementById("progress");
const hideButton = document.getElementById("hide-preloader");

const preloader = new ProgressPreloader({
    container: document.getElementById("preloader"),
    hide: false
  },

  {
    onLoaded: () => {
      hideButton.classList.add("show");

      hideButton.addEventListener("click", () => {
        preloader.hide();
      });
    },
    onProgress: () => {
      const {
        progress
      } = preloader;
      const percent = clamp(progress * 100, 0, 99);
      const html = `${percent.toFixed(0).padStart(2, "0")}%`;

      progressElement.innerHTML = html;
    }
  });

  </script>
      </body>
