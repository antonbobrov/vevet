<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · azONLzb</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.fullpage-center {
  padding-inline: 1.25rem;
}

.carousel {
  position: relative;
  width: 100%;

  height: 50vw;
  max-height: 50vh;

  opacity: 0;
  transition: opacity 0.25s linear;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 1rem;
  background: rgba(255, 255, 255, 0.08);
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="carousel" id="carousel"></div>
</div>
        
  <script type="module">
import {
  Snap,
  SnapSlide
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const createSlides = count => {
  const slides = new Array(count).fill(0).map((item, index) => {
    const size = "40vw";

    const element = document.createElement("div");
    element.className = "slide";
    element.innerHTML = `<span>${index}</span>`;
    element.style.width = size;

    return new SnapSlide(element, {
      size,
      virtual: true
    });

  });

  return slides;
};

const carousel = new Snap({
  container,
  slides: createSlides(500),
  gap: "1.25rem",
  grabCursor: true,
  loop: true,
  origin: "center"
});

container.classList.add("ready");

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    coord,
    isVisible
  }) => {
    element.style.transform = `translate(${coord}px, 0)`;
  });
});

  </script>
      </body>
    </html>
