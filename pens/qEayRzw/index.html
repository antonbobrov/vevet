        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 20px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;

  height: 100vh;
  overflow: hidden;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-variant-numeric: tabular-nums;
}

.carousel {
  --slide-size: calc(min(100vh, 100vw) / 5);

  position: relative;
  width: 100vw;
  height: var(--slide-size);

  opacity: 0;
  transition: opacity 0.25s linear;

  transform-style: preserve-3d;
  perspective: calc(var(--slide-size) * 2);
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  width: var(--slide-size);
  height: var(--slide-size);

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(255, 255, 255, 0.08);
  border-radius: calc(var(--slide-size) * 0.1);
  overflow: hidden;
}

.image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">

  <script type="module">
import {
  Snap,
  scoped
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  grabCursor: true,
  loop: true,
  gap: "1rem",
  origin: "center",
  freemode: true
});

container.classList.add("ready");

carousel.on("update", () => {
  const {
    domSize
  } = carousel;

  carousel.slides.forEach(({
    element,
    coord,
    size
  }) => {
    const amp = size;
    const t = (coord + size / 2) / domSize;
    const centerT = scoped(t, 0.5, 1);

    const y = Math.sin(Math.PI * t) * -amp + size / 2;

    const slope = amp * Math.PI * Math.cos(Math.PI * t) / carousel.domSize;

    const rotation = -Math.atan(slope);
    const z = (1 - Math.abs(centerT)) * size;

    element.style.transform = `
      translate3d(${coord}px, ${y}px, ${z}px)
      rotate(${rotation}rad)
    `;
  });
});

  </script>
      </body>
