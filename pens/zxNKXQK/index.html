<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · zxNKXQK</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.fullpage-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.container {
  width: 3rem;
  height: 3rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  background: var(--gradient-brand-135, #000);
  border-radius: 0.5rem;

  img {
    width: 1.25rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center" id="page">
  <div id="container" class="container">
    <img src="https://www.svgrepo.com/show/521614/drag.svg" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Swipe,
  onResize,
  clamp
} from "https://esm.sh/vevet@5";

const page = document.getElementById("page");

const swipe = new Swipe({
  container: document.getElementById("container"),
  inertia: true,
  grabCursor: true,
  bounds: () => ({
    x: [
      (page.clientWidth - container.clientWidth) / -2,
      (page.clientWidth - container.clientWidth) / 2
    ],

    y: [
      (page.clientHeight - container.clientHeight) / -2,
      (page.clientHeight - container.clientHeight) / 2
    ]
  }),

  inertiaDistanceModifier: distance => {
    const limit = 100;

    return {
      x: clamp(distance.x, -limit, limit),
      y: clamp(distance.y, -limit, limit),
      angle: 0
    };

  },
  onMove: ({
    movement
  }, {
    container
  }) => {
    container.style.transform = `translate(${movement.x}px, ${movement.y}px)`;
  }
});

onResize({
  elements: [page],
  callback: () => {
    swipe.calculateBounds();
    swipe.releaseBounce(0);
  },
  resizeDebounce: 100
});

  </script>
      </body>
    </html>
