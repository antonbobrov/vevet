        <style>body {
  margin: 0;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.container {
  --size: min(70vh, 70vw);

  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: var(--size);
  height: var(--size);

  transform-style: preserve-3d;
  perspective: calc(var(--size) * 1.5);
}

.slide {
  --slide-size: calc(var(--size) / 4);

  position: absolute;
  top: calc(50% - var(--slide-size) / 2);
  left: calc(50% - var(--slide-size) / 2);
  width: var(--slide-size);
  height: var(--slide-size);

  display: flex;
  justify-content: center;
  align-items: center;
}

.wrapper {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  border-radius: 8px;
  overflow: hidden;
}

.wrapper img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>

  <script type="module">
import {
  Snap
} from "https://esm.sh/vevet@5";

const carousel = new Snap({
    container: document.getElementById("container"),
    direction: "horizontal",
    wheel: true,
    wheelAxis: "y",
    loop: true,
    freemode: true,
    grabCursor: true
  },

  {
    onUpdate: (data, {
      containerSize,
      slides
    }) => {
      const radius = containerSize / 2;
      const p2 = Math.PI * 2;
      const offset = Math.PI * -0.5;

      slides.forEach(slide => {
        const element = slide.element;
        const progress = -slide.progress / slides.length;

        const x = Math.cos(p2 * progress + offset) * radius;
        const z = -Math.sin(p2 * progress + offset) * radius;
        const rotation = p2 * progress;

        element.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotation}rad)`;
      });
    }
  });

  </script>
