<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · ZYYzRwy</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>#quote {
  width: 20em;
  max-width: 100%;
  line-height: 1;
  text-align: center;
  font-kerning: none;

  perspective: 400px;

  opacity: 0;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="quote">
    SplitText supports multiple <br><br>
    <b style="color: #ff8709">newlines</b>,<br><br>
    <b style="color: #00bae2">non-breaking&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;spaces,</b> <b style="color: #f100cb">nested tags</b> like&nbsp;&lt;span&gt;,
    &lt;strong&gt;, and handles&nbsp;emojis&nbsp;🥰
  </div>

  <button type="button" id="animate" class="btn">Animate</button>
</div>
        
  <script type="module">
import {
  SplitText
} from "https://esm.sh/vevet@5";
import gsap from "https://esm.sh/gsap@3";

const tl = gsap.timeline();
const container = document.getElementById("quote");

const splitText = new SplitText({
  container,
  letters: true,
  onSplit: (data, {
    letters
  }) => {
    container.style.opacity = "1";

    tl.from(letters, {
      duration: 0.8,
      opacity: 0,
      scale: 0,
      y: 80,
      rotationX: 180,
      transformOrigin: "0% 50% -50",
      ease: "back",
      stagger: 0.01
    });

  }
});

document.getElementById("animate").onclick = function() {
  tl.restart();
};

  </script>
      </body>
    </html>
