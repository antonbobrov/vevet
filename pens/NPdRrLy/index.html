<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · NPdRrLy</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  width: 80%;
  height: 3rem;

  border-radius: 0.5rem;
  background: rgba(255, 255, 255, 0.1);
}

.thumb {
  width: 3rem;
  height: 3rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: inherit;
  background: var(--gradient-brand-90);

  img {
    width: 1.5rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="container" class="container">
    <div id="thumb" class="thumb"><img src="https://www.svgrepo.com/show/379996/drag-horizontal.svg" alt=""></div>
  </div>
</div>
        
  <script type="module">
import {
  Swipe,
  onResize
} from "https://esm.sh/vevet@5";

const container = document.getElementById("container");
const thumb = document.getElementById("thumb");

const swipe = new Swipe({
  container,
  thumb,
  inertia: true,
  grabCursor: true,
  bounds: () => ({
    x: [0, container.clientWidth - thumb.clientWidth]
  }),

  onMove: ({
    movement
  }, {
    container
  }) => {
    thumb.style.transform = `translate(${movement.x}px, 0)`;
  }
});

onResize({
  element: [container],
  callback: () => {
    swipe.calculateBounds();
    swipe.releaseBounce(0);
  },
  resizeDebounce: 100
});

  </script>
      </body>
    </html>
