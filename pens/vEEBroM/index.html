<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · vEEBroM</title>
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0 30px;
  min-height: 100vh;
  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
  color: #fff;
}

h1 {
  margin: 30px 0;
  font-weight: 500;
  font-size: 30px;
}

.container {
  position: relative;
  width: 200px;
  height: 300px;
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
}

.source {
  display: block;
  width: 100px;
  height: auto;
}</style>
      </head>
      <body>
        <h1>Original</h1>

<img id="source" class="source" src="https://picsum.photos/2000/2000">

<h1>Prerendered</h1>

<div class="container" id="container"></div>
        
  <script type="module">
import {
  CanvasMedia
} from "https://esm.sh/vevet@5";

const sourceImage = document.getElementById("source");

const handleLoad = () => {
  const instance = new CanvasMedia({
    container: document.getElementById("container"),
    media: sourceImage,
    rule: "contain"
  });

};

if (sourceImage.complete) {
  handleLoad();
} else {
  sourceImage.onload = handleLoad;
}

  </script>
      </body>
    </html>
