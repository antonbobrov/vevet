<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · vEEBroM</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  position: relative;
  width: 200px;
  height: 250px;
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
}

.source {
  display: block;
  width: 100px;
  height: auto;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <p>Original</p>

  <img id="source" class="source" src="https://picsum.photos/2000/2000">

  <p>Prerendered</p>

  <div class="container" id="container"></div>
</div>
        
  <script type="module">
import {
  CanvasMedia
} from "https://esm.sh/vevet@5";

const sourceImage = document.getElementById("source");

const handleLoad = () => {
  const instance = new CanvasMedia({
    container: document.getElementById("container"),
    media: sourceImage,
    rule: "contain"
  });

};

if (sourceImage.complete) {
  handleLoad();
} else {
  sourceImage.onload = handleLoad;
}

  </script>
      </body>
    </html>
