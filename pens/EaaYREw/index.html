<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · EaaYREw</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;

  background: rgb(30, 43, 82);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
}

.info {
  width: 300px;

  p {
    margin: 10px 0;
  }
}

.buttons {
  margin-top: 30px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1vw;
  width: 300px;
}

.button {
  height: 48px;
  padding: 0 32px;
  border: 0;
  cursor: pointer;

  background: linear-gradient(135deg,
      rgb(13, 110, 253) 0%,
      rgb(140, 122, 230) 50%,
      rgb(0, 201, 177) 100%);
  background-size: 200% auto;
  box-shadow: 0 4px 20px rgba(13, 110, 253, 0.1);
  border-radius: 50vw;

  font: inherit;
  font-size: 24px;
  color: currentColor;

  transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.button:hover {
  background-position: right center;
}</style>
      </head>
      <body>
        <div class="info">
  <p id="target"></p>
  <p id="fps"></p>
  <p id="factor"></p>
  <p id="time"></p>
  <p id="index"></p>
</div>

<div class="buttons">
  <button type="button" class="button" id="play">Play</button>

  <button type="button" class="button" id="pause">Pause</button>
</div>
        
  <script type="module">
import {
  Raf
} from "https://esm.sh/vevet@5";

const target = document.getElementById("target");
const fps = document.getElementById("fps");
const factor = document.getElementById("factor");
const time = document.getElementById("time");
const index = document.getElementById("index");

const raf = new Raf({
  enabled: true,
  onFrame: () => {
    target.innerHTML = `Target FPS: ${raf.props.fps}`;
    fps.innerHTML = `Current FPS: ${raf.fps}`;
    factor.innerHTML = `FPS Factor: ${raf.fpsFactor.toFixed(2)}`;
    time.innerHTML = `Time: ${raf.timestamp.toFixed(2)}`;
    index.innerHTML = `Frame Index: ${raf.index}`;
  }
});

document.getElementById("play").addEventListener("click", () => raf.play());

document.getElementById("pause").addEventListener("click", () => raf.pause());

  </script>
      </body>
    </html>
