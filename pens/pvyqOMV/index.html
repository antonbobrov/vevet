<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · pvyqOMV</title>
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  height: 100vh;
  width: 100%;
  overflow: hidden;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.ball {
  width: 80px;
  height: 80px;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  background: linear-gradient(135deg,
      rgb(13, 110, 253) 0%,
      rgb(140, 122, 230) 50%,
      rgb(0, 201, 177) 100%);

  font-family: "Ubuntu", sans-serif;
  font-size: 12px;
  color: #fff;
}</style>
      </head>
      <body>
        <div id="ball" class="ball">
  Swipe Me
</div>
        
  <script type="module">
import {
  Swipe,
  vevet,
  clamp
} from "https://esm.sh/vevet@5";

let x = 0;
let y = 0;
let xDir = 1;
let yDir = 1;

new Swipe({
  container: document.getElementById("ball"),
  inertia: true,
  grabCursor: true,
  onStart: () => {
    xDir = 1;
    yDir = 1;
  },
  onMove: ({
    step
  }, {
    hasInertia,
    container
  }) => {
    if (hasInertia) {
      if (x >= vevet.width / 2 || x <= -vevet.width / 2) {
        xDir *= -1;
      }

      if (y >= vevet.height / 2 || y <= -vevet.height / 2) {
        yDir *= -1;
      }
    }

    x = clamp(x + step.x * xDir, -vevet.width / 2, vevet.width / 2);
    y = clamp(y + step.y * yDir, -vevet.height / 2, vevet.height / 2);

    container.style.transform = `translate(${x}px, ${y}px)`;
  }
});

  </script>
      </body>
    </html>
