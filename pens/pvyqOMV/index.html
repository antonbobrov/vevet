<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · pvyqOMV</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.ball {
  width: 3rem;
  height: 3rem;

  border-radius: 50%;
  background: radial-gradient(rgb(0, 201, 177) 10%, rgb(30, 43, 82));
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="ball" class="ball"></div>
</div>
        
  <script type="module">
import {
  Swipe,
  vevet,
  clamp
} from "https://esm.sh/vevet@5";

let x = 0;
let y = 0;
let xDir = 1;
let yDir = 1;

new Swipe({
  container: document.getElementById("ball"),
  inertia: true,
  grabCursor: true,
  onStart: () => {
    xDir = 1;
    yDir = 1;
  },
  onMove: ({
    step
  }, {
    hasInertia,
    container
  }) => {
    if (hasInertia) {
      if (x >= vevet.width / 2 || x <= -vevet.width / 2) {
        xDir *= -1;
      }

      if (y >= vevet.height / 2 || y <= -vevet.height / 2) {
        yDir *= -1;
      }
    }

    x = clamp(x + step.x * xDir, -vevet.width / 2, vevet.width / 2);
    y = clamp(y + step.y * yDir, -vevet.height / 2, vevet.height / 2);

    container.style.transform = `translate(${x}px, ${y}px)`;
  }
});

  </script>
      </body>
    </html>
