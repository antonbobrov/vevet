<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · zxqbwVg</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.wrapper {
  position: relative;
  width: 10rem;
  height: 10rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  background: rgba(255, 255, 255, 0.1);
  border-radius: 0.25rem;
}

.container {
  width: 2rem;
  height: 2rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  background: var(--gradient-brand-135, #000);
  border-radius: 0.25rem;

  img {
    width: 1rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="wrapper" class="wrapper">
    <div id="container" class="container">
      <img src="https://www.svgrepo.com/show/521614/drag.svg" alt="">
    </div>
  </div>
</div>
        
  <script type="module">
import {
  Swipe,
  vevet,
  clamp,
  EaseOutBack
} from "https://esm.sh/vevet@5";

const wrapper = document.getElementById("wrapper");
const container = document.getElementById("container");

new Swipe({
  container: document.getElementById("container"),
  grabCursor: true,
  inertia: true,
  overflow: () => 20,
  bounds: () => ({
    x: [
      (wrapper.clientWidth - container.clientWidth) * -0.5,
      (wrapper.clientWidth - container.clientWidth) * 0.5
    ],

    y: [
      (wrapper.clientHeight - container.clientHeight) * -0.5,
      (wrapper.clientHeight - container.clientHeight) * 0.5
    ]
  }),

  onMove: ({
    movement
  }, {
    container
  }) => {
    container.style.transform = `translate(${movement.x}px, ${movement.y}px)`;
  }
});

  </script>
      </body>
    </html>
