<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · XJJrYeR</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>#marquee {
  img {
    width: 300px !important;
    min-width: 30vw;
    height: auto;
    border-radius: 1rem;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="marquee">
    <img src="https://picsum.photos/id/199/300/200" width="300" height="200" alt="">
    <img src="https://picsum.photos/id/201/300/200" width="300" height="200" alt="">
    <img src="https://picsum.photos/id/203/300/200" width="300" height="200" alt="">
    <img src="https://picsum.photos/id/206/300/200" width="300" height="200" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Marquee,
  Swipe
} from "https://esm.sh/vevet@5";

const container = document.getElementById("marquee");

const marquee = new Marquee({
  container,
  speed: "0.25vw",
  gap: "2vw"
});

const swipe = new Swipe({
  container,
  grabCursor: true,
  inertia: true,
  onMove: ({
    step
  }) => marquee.render(-step.x),
  onStart: () => marquee.updateProps({
    enabled: false
  }),
  onEnd: ({
    diff
  }) => {
    marquee.updateProps({
      enabled: true,
      speed: diff.x > 0 ? "-0.25vw" : "0.25vw"
    });

  }
});

  </script>
      </body>
    </html>
