<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · PwNXrEV</title>
        <style>body {
  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.carousel {
  --size: min(80vw, 80vh);

  position: fixed;
  top: 50%;
  left: 50%;
  width: var(--size);
  height: calc(var(--size) * 0.7);
  transform: translate(-50%, -50%);

  transform-style: preserve-3d;
  perspective: calc(var(--size) * 1.5);

  opacity: 0;
  transition: opacity 0.25s linear;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  overflow: hidden;
}

.slide img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">
    <img src="https://picsum.photos/id/170/1920/1080" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/190/1920/1080" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/230/1920/1080" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/260/1920/1080" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  inRange,
  lerp,
  clamp
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const ampY = 0.5;
const ampZ = 0.6;

const carousel = new Snap({
  container,
  direction: "vertical",
  grabCursor: true,
  wheel: true
});

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    progress,
    size
  }) => {
    let opacity = 0;
    let y = 0;
    let z = 0;
    let rotateX = 0;
    let brightness = 1;

    if (inRange(progress, 0, 1)) {
      const sine = Math.sin(Math.PI * progress);
      y = sine * size * ampY * -1;
      z = progress * size * ampZ * -1;
      rotateX = progress * 180;
      opacity = 1;
      brightness = lerp(1, 0.25, progress);
    } else if (inRange(progress, -Infinity, 0)) {
      y = progress * size * -0.2;
      z = progress * size * ampZ;
      opacity = 1;
      brightness = clamp(1 - Math.abs(progress) * 0.25);
      rotateX = progress * 5;
    }

    element.style.opacity = `${opacity}`;
    element.style.transform = `translate3d(0, ${y}px, ${z}px) rotateX(${rotateX}deg)`;
    element.style.filter = `brightness(${brightness})`;
  });
});

container.classList.add("ready");

  </script>
      </body>
    </html>
