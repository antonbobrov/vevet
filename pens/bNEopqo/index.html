<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNEopqo</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style></style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="marquee">Resize the window to see changes</div>
</div>
        
  <script type="module">
import {
  Marquee,
  Responsive
} from "https://esm.sh/vevet@5";

const instance = new Marquee({
  container: document.getElementById("marquee"),
  gap: 20
});

new Responsive(instance, [{
    at: "@media (min-width: 350px)",
    props: {
      speed: 4
    }
  },

  {
    at: "@media (min-width: 768px)",
    props: {
      speed: -4
    }
  },

  {
    at: "@media (min-width: 1000px)",
    props: {
      gap: 100
    }
  }
]);

  </script>
      </body>
    </html>
