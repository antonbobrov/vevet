<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNEopqo</title>
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;

  background: rgb(30, 43, 82);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-size: 40px;
}

.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;
}</style>
      </head>
      <body>
        <div class="page">
  <div id="marquee">Resize the window to see changes</div>
</div>
        
  <script type="module">
import {
  Marquee,
  Responsive
} from "https://esm.sh/vevet@5";

const instance = new Marquee({
  container: document.getElementById("marquee"),
  gap: 20
});

new Responsive(instance, [{
    at: "@media (min-width: 768px)",
    props: {
      speed: 4
    }
  },

  {
    at: "@media (min-width: 1000px)",
    props: {
      gap: 100
    }
  }
]);

  </script>
      </body>
    </html>
