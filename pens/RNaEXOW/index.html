<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · RNaEXOW</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  display: grid;
  gap: 1rem;
  width: 15rem;
  max-width: 100%;
  padding: 1rem;
}

.sample {
  width: 1.5rem;
  height: 1.5rem;
  border-radius: 0.5rem;
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
}

.buttons {
  margin-top: 0.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
  width: 100%;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="container">
    Standard lerp:

    <div class="sample" id="lerp"></div>

    Damping:
    <div class="sample" id="damp"></div>

    <div class="buttons">
      <button type="button" class="btn" id="play">Play</button>

      <button type="button" class="btn" id="pause">Pause</button>
    </div>
  </div>
</div>
        
  <script type="module">
import {
  Raf,
  lerp
} from "https://esm.sh/vevet@5";

const lerpElement = document.getElementById("lerp");
const dampElement = document.getElementById("damp");

const lerpValue = {
  current: 0,
  target: 0
};
const dampValue = {
  current: 0,
  target: 0
};

const raf = new Raf({
  enabled: false,
  onFrame: () => {
    const ease = 0.01;

    lerpValue.current = lerp(lerpValue.current, lerpValue.target, ease);

    dampValue.current = lerp(
      dampValue.current,
      dampValue.target,
      raf.lerpFactor(ease));

    lerpElement.style.transform = `translateX(${lerpValue.current}px)`;
    dampElement.style.transform = `translateX(${dampValue.current}px)`;
  }
});

document.getElementById("play").addEventListener("click", () => {
  lerpValue.target = lerpValue.target > 0 ? 0 : 270;
  dampValue.target = dampValue.target > 0 ? 0 : 270;

  raf.play();
});

document.getElementById("pause").addEventListener("click", () => raf.pause());

  </script>
      </body>
    </html>
