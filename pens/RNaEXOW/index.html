<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · RNaEXOW</title>
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
}

.container {
  display: grid;
  gap: 30px;
  width: 300px;
}

.sample {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1vw;
}

.button {
  height: 48px;
  padding: 0 32px;
  border: 0;
  cursor: pointer;

  background: linear-gradient(135deg,
      rgb(13, 110, 253) 0%,
      rgb(140, 122, 230) 50%,
      rgb(0, 201, 177) 100%);
  background-size: 200% auto;
  box-shadow: 0 4px 20px rgba(13, 110, 253, 0.1);
  border-radius: 50vw;

  font: inherit;
  font-size: 24px;
  color: currentColor;

  transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.button:hover {
  background-position: right center;
}</style>
      </head>
      <body>
        <div class="container">
  Standard lerp:

  <div class="sample" id="lerp"></div>

  Damping:
  <div class="sample" id="damp"></div>

  <div class="buttons">
    <button type="button" class="button" id="play">Play</button>

    <button type="button" class="button" id="pause">Pause</button>
  </div>
</div>
        
  <script type="module">
import {
  Raf,
  lerp
} from "https://esm.sh/vevet@5";

const lerpElement = document.getElementById("lerp");
const dampElement = document.getElementById("damp");

const lerpValue = {
  current: 0,
  target: 0
};
const dampValue = {
  current: 0,
  target: 0
};

const raf = new Raf({
  enabled: false,
  onFrame: () => {
    const ease = 0.01;

    lerpValue.current = lerp(lerpValue.current, lerpValue.target, ease);

    dampValue.current = lerp(
      dampValue.current,
      dampValue.target,
      raf.lerpFactor(ease));

    lerpElement.style.transform = `translateX(${lerpValue.current}px)`;
    dampElement.style.transform = `translateX(${dampValue.current}px)`;
  }
});

document.getElementById("play").addEventListener("click", () => {
  lerpValue.target = lerpValue.target > 0 ? 0 : 270;
  dampValue.target = dampValue.target > 0 ? 0 : 270;

  raf.play();
});

document.getElementById("pause").addEventListener("click", () => raf.pause());

  </script>
      </body>
    </html>
