<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · jEENKjV</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.nav {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0 1rem;
}

.line {
  position: relative;
  width: 80%;
  height: 0.5rem;
  border-radius: 50vw;
  background: rgba(255, 255, 255, 0.1);
}

.thumb {
  position: absolute;
  top: -0.5rem;
  left: 0;
  width: 0.25rem;
  height: 1.5rem;
  border-radius: 50vw;
  background: linear-gradient(135deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="line">
    <div class="thumb" id="thumb"></div>
  </div>

  <div class="nav">
    <button type="button" id="play" class="btn">Play</button>
    <button type="button" id="pause" class="btn">Pause</button>
    <button type="button" id="reverse" class="btn">Reverse</button>
    <button type="button" id="reset" class="btn">Reset</button>
  </div>
</div>
        
  <script type="module">
import {
  Timeline,
  EaseOutBack
} from "https://esm.sh/vevet@5";

const thumb = document.getElementById("thumb");

const tm = new Timeline({
    duration: 2000,
    easing: EaseOutBack
  },

  {
    onUpdate: ({
      progress,
      eased
    }) => {
      thumb.style.left = `${eased * 100}%`;
    }
  });

document.getElementById("play").addEventListener("click", () => tm.play());

document.getElementById("pause").addEventListener("click", () => tm.pause());

document.
getElementById("reverse").
addEventListener("click", () => tm.reverse());

document.getElementById("reset").addEventListener("click", () => tm.reset());

  </script>
      </body>
    </html>
