<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNpyxQP</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  padding: 0 10px;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  text-align: center;
  font-size: 30px;
}

.v-cursor__inner {
  background-color: transparent !important;
  border: 2px solid #fff;
  border-radius: 50%;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.1);
  width: calc(100% - 40px);
  max-width: 600px;
  height: 300px;
  border-radius: 16px;
}

h1 {
  margin: 30px 0;
  font-size: 40px;
  font-weight: 600;
}</style>
      </head>
      <body>
        <div class="container" id="container">
  <h1>Custom Cursor Area</h1>
</div>
        
  <script type="module">
import {
  Cursor
} from "https://esm.sh/vevet@5";

const cursor = new Cursor({
  container: document.getElementById("container"),
  hideNative: true
});

  </script>
      </body>
