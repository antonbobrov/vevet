<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · KwVXVNg</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style></style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="marquee">The speed is adjustable depending on users's fps.&nbsp;</div>

  <div class="double-grid">
    <button type="button" class="btn" id="enable">Enable</button>

    <button type="button" class="btn" id="disable">Disable</button>
  </div>
</div>
        
  <script type="module">
import {
  Marquee
} from "https://esm.sh/vevet@5";

const instance = new Marquee({
  container: document.getElementById("marquee")
});

const enable = document.getElementById("enable");
enable.addEventListener("click", () => {
  instance.updateProps({
    adjustSpeed: true
  });
});

const disable = document.getElementById("disable");
disable.addEventListener("click", () => {
  instance.updateProps({
    adjustSpeed: false
  });
});

  </script>
      </body>
    </html>
