<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · azNPaxx</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  height: 100vh;
  width: 100%;
  overflow: hidden;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.container {
  width: 120px;
  height: 120px;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 10px;
  background: linear-gradient(135deg,
      rgb(13, 110, 253) 0%,
      rgb(140, 122, 230) 50%,
      rgb(0, 201, 177) 100%);

  font-family: "Ubuntu", sans-serif;
  font-size: 16px;
  color: #fff;
}</style>
      </head>
      <body>
        <div id="container" class="container">
  Drag Me
</div>
        
  <script type="module">
import {
  Swipe,
  vevet,
  clamp
} from "https://esm.sh/vevet@5";

let x = 0;
let y = 0;

new Swipe({
  container: document.getElementById("container"),
  inertia: true,
  grabCursor: true,
  onMove: ({
    step
  }, {
    container
  }) => {
    x = clamp(x + step.x, -vevet.width / 2, vevet.width / 2);
    y = clamp(y + step.y, -vevet.height / 2, vevet.height / 2);

    container.style.transform = `translate(${x}px, ${y}px)`;
  }
});

  </script>
      </body>
    </html>
