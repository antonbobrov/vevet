<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · azNPaxx</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.fullpage-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.container {
  width: 3rem;
  height: 3rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  background: var(--gradient-brand-135, #000);
  border-radius: 0.5rem;

  img {
    width: 1.25rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center" id="page">
  <div id="container" class="container">
    <img src="https://www.svgrepo.com/show/521614/drag.svg" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Swipe,
  clamp
} from "https://esm.sh/vevet@5";

const page = document.getElementById("page");

let x = 0;
let y = 0;

new Swipe({
  container: document.getElementById("container"),
  inertia: true,
  grabCursor: true,
  onMove: ({
    step
  }, {
    container
  }) => {
    const pageWidth = page.clientWidth;
    const pageHeight = page.clientHeight;

    x = clamp(x + step.x, -pageWidth / 2, pageWidth / 2);
    y = clamp(y + step.y, -pageHeight / 2, pageHeight / 2);

    container.style.transform = `translate(${x}px, ${y}px)`;
  }
});

  </script>
      </body>
    </html>
