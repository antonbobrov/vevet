<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · QwKwBvv</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);

  color: #fff;
  font-family: "Ubuntu", sans-serif;
}

.carousel {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;

  opacity: 0;
  transition: opacity 0.25s linear;

  transform-style: preserve-3d;
  perspective: 100rem;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  will-change: transform, clip-path;
}

.image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title {
  margin: 0;

  position: relative;

  font-size: 8vw;
  font-weight: bold;
  color: #fff;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">
    <img class="image" src="https://picsum.photos/id/608/1920/1080" alt="">
    <p class="title">Slide 1</p>
  </div>

  <div class="slide">
    <img class="image" src="https://picsum.photos/id/698/1920/1080" alt="">
    <p class="title">Slide 2</p>
  </div>

  <div class="slide">
    <img class="image" src="https://picsum.photos/id/988/1920/1080" alt="">
    <p class="title">Slide 3</p>
  </div>

  <div class="slide">
    <img class="image" src="https://picsum.photos/id/788/1920/1080" alt="">
    <p class="title">Slide 4</p>
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  EaseOutExpo
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  grabCursor: true,
  loop: true,
  direction: "vertical",
  wheel: true,
  followWheel: false,
  duration: 1500,
  lerp: 0.15
});

container.classList.add("ready");

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    coord,
    progress,
    isVisible
  }) => {
    let translateY = 0;
    let clipY1 = 100;
    let clipY2 = 100;
    let zIndex = 0;
    let rot = 0;
    let origin = "";

    if (progress >= 0 && progress < 1) {
      clipY1 = (1 - progress) * 100;
      clipY2 = (1 - progress ** 2) * 100;
      translateY = progress * -10;
      rot = 50 * progress;
      zIndex = 2;
      origin = "top center";
    } else if (progress < 0 && progress > -1) {
      clipY1 = (1 - progress) * 100;
      translateY = progress * -10;
      rot = 50 * progress;
      zIndex = 1;
      origin = "bottom center";
    } else {
      translateY = 500;
    }

    element.style.clipPath = `polygon(0% 0%, 100% 0%, 100% ${clipY1}%, 0% ${clipY2}%)`;
    element.style.transform = `translate(0, ${translateY}%) rotateX(${rot}deg)`;
    element.style.transformOrigin = origin;
    element.style.zIndex = zIndex;
  });
});

  </script>
      </body>
    </html>
