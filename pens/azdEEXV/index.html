<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · azdEEXV</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>body {
  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.carousel {
  --size: min(70vw, 70vh);

  position: fixed;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 100%;
  height: var(--size);

  perspective: calc(var(--size) * 1.6);
  transform-style: preserve-3d;

  opacity: 0;
  transition: opacity 0.25s linear;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  width: calc(var(--size) * 0.6);
  height: var(--size);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0px 0px 50px 0px rgba(0, 0, 0, 0.1);
}

.slide img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">
    <img src="https://picsum.photos/id/757/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/59/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/400/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/260/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/358/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/478/400/600" alt="">
  </div>
  <div class="slide">
    <img src="https://picsum.photos/id/625/400/600" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  vevet
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  direction: "horizontal",
  grabCursor: true,
  wheel: true,
  wheelAxis: "y",
  origin: "center",
  loop: true,
  shortSwipes: false,
  freemode: "sticky"
});

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    size,
    coord,
    progress
  }) => {
    const z = Math.abs(progress ** 2) * -(size * 0.625);
    const rZ = progress * 5;

    element.style.transform = `translateX(${coord}px) translateZ(${z}px) rotateZ(${rZ}deg)`;
  });
});

container.classList.add("ready");

  </script>
      </body>
    </html>
