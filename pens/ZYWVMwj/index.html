<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · ZYWVMwj</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  width: 7rem;
  height: 7rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 1rem;
  background: var(--gradient-brand-135, #000);

  font-size: 0.75rem;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="container" class="container">
    Swipe Me
  </div>
</div>
        
  <script type="module">
import {
  Swipe
} from "https://esm.sh/vevet@5";

new Swipe({
  container: document.getElementById("container"),
  onStart: (data, {
    container
  }) => {
    container.innerHTML = "start";
  },
  onToLeft: (data, {
    container
  }) => {
    container.innerHTML = "to left";
  },
  onToRight: (data, {
    container
  }) => {
    container.innerHTML = "to right";
  },
  onToTop: (data, {
    container
  }) => {
    container.innerHTML = "to top";
  },
  onToBottom: (data, {
    container
  }) => {
    container.innerHTML = "to bottom";
  }
});

  </script>
      </body>
    </html>
