<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNwKERM</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);

  color: #fff;
  font-family: "Ubuntu", sans-serif;
}

.carousel {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;

  opacity: 0;
  transition: opacity 0.25s linear;

  transform-style: preserve-3d;
  perspective: 100rem;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  padding: 0 10vw;
  overflow: hidden;

  will-change: transform, clip-path;
}

.image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.content {
  position: relative;
  width: 100%;
  height: 100%;
  transform-origin: center left;

  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 1vw;
}

.title {
  margin: 0;

  font-size: 8vw;
  font-weight: bold;
  color: #fff;
}

.description {
  margin: 0;

  font-size: 3vw;
  font-weight: bold;
  color: #fff;
}</style>
      </head>
      <body>
        <div class="carousel" id="carousel">
  <div class="slide">
    <img class="image" data-snap-parallax-y="30%" data-snap-parallax-scale="0.1" data-snap-parallax-scale-abs src="https://picsum.photos/id/608/1920/1080" alt="">
    <div class="content" data-snap-parallax-opacity="-1" data-snap-parallax-rotate="-10deg" data-snap-parallax-y="20%" data-snap-parallax-scale="0.05">
      <p class="title">Slide 1</p>
      <p class="description">Lorem ipsum dolor sit amet</p>
    </div>
  </div>

  <div class="slide">
    <img class="image" data-snap-parallax-y="30%" data-snap-parallax-scale="0.1" data-snap-parallax-scale-abs src="https://picsum.photos/id/698/1920/1080" alt="">
    <div class="content" data-snap-parallax-opacity="-1" data-snap-parallax-rotate="-10deg" data-snap-parallax-y="20%" data-snap-parallax-scale="0.05">
      <p class="title">Slide 2</p>
      <p class="description">Lorem ipsum dolor sit amet</p>
    </div>
  </div>

  <div class="slide">
    <img class="image" data-snap-parallax-y="30%" data-snap-parallax-scale="0.1" data-snap-parallax-scale-abs src="https://picsum.photos/id/988/1920/1080" alt="">
    <div class="content" data-snap-parallax-opacity="-1" data-snap-parallax-rotate="-10deg" data-snap-parallax-y="20%" data-snap-parallax-scale="0.05">
      <p class="title">Slide 3</p>
      <p class="description">Lorem ipsum dolor sit amet</p>
    </div>
  </div>

  <div class="slide">
    <img class="image" data-snap-parallax-y="30%" data-snap-parallax-scale="0.1" data-snap-parallax-scale-abs src="https://picsum.photos/id/788/1920/1080" alt="">
    <div class="content" data-snap-parallax-opacity="-1" data-snap-parallax-rotate="-10deg" data-snap-parallax-y="20%" data-snap-parallax-scale="0.05">
      <p class="title">Slide 1</p>
      <p class="description">Lorem ipsum dolor sit amet</p>
    </div>
  </div>
  <div class="slide">
    <img class="image" data-snap-parallax-y="30%" data-snap-parallax-scale="0.1" src="https://picsum.photos/id/608/1920/1080" alt="">
    <div class="content" data-snap-parallax-opacity="-1" data-snap-parallax-rotate="-10deg" data-snap-parallax-y="20%" data-snap-parallax-scale="0.05">
      <p class="title">Slide 4</p>
      <p class="description">Lorem ipsum dolor sit amet</p>
    </div>
  </div>
</div>
        
  <script type="module">
import {
  Snap
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  grabCursor: true,
  loop: true,
  direction: "vertical",
  wheel: true,
  followWheel: false,
  duration: 1500
});

container.classList.add("ready");

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    coord
  }) => {
    element.style.transform = `translateY(${coord}px)`;
  });
});

  </script>
      </body>
    </html>
