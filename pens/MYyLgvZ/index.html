<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · MYyLgvZ</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  display: grid;
  gap: 1rem;
  width: 250px;
  max-width: 100%;
  padding: 1rem;
  box-sizing: content-box;
}

.sample {
  width: 50px;
  height: 50px;
  border-radius: 8px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: var(--gradient-sunset, #000);

  font-size: 16px;
}

.buttons {
  margin-top: 0.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
  width: 100%;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="container">
    <div class="sample" id="factor"></div>

    <div class="buttons">
      <button type="button" class="btn" id="play">Play</button>

      <button type="button" class="btn" id="pause">Pause</button>
    </div>
  </div>
</div>
        
  <script type="module">
import {
  Raf,
  lerp
} from "https://esm.sh/vevet@5";

const factor = document.getElementById("factor");

let x = 0;

const raf = new Raf({
  enabled: true,
  onFrame: () => {
    x = (x + raf.fpsFactor) % 200;

    factor.style.transform = `translateX(${x}px)`;
    factor.innerHTML = raf.fpsFactor.toFixed(2);
  }
});

document.getElementById("play").addEventListener("click", () => raf.play());

document.getElementById("pause").addEventListener("click", () => raf.pause());

  </script>
      </body>
    </html>
