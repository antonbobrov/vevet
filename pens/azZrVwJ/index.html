<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · azZrVwJ</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0 10px;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
}

.dot-cursor {
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
  border-radius: 50%;
}

h1 {
  margin: 30px 0;
  font-size: 40px;
  font-weight: 600;
  text-align: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;

  .grid {
    width: 600px;
    max-width: 100%;
  }
}

.grid {
  display: grid;
  gap: 10px;
  grid-template-columns: 1fr 1fr 1fr;
}

.item {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  padding: 30px;
  border-radius: 10px;
  font-size: 20px;
  background: rgba(255, 255, 255, 0.1);

  transition: background-color 1s;

  &:hover {
    background-color: rgba(255, 255, 255, 0.15);
  }
}</style>
      </head>
      <body>
        <div class="container">
  <h1>Cursor Behavior</h1>

  <div class="grid">
    <div class="item js-snap">Snap</div>
    <div class="item js-sticky">Sticky</div>
    <div class="item js-friction">Friction</div>
  </div>
</div>
        
  <script type="module">
import {
  Cursor
} from "https://esm.sh/vevet@5";

const dotCursor = new Cursor({
  lerp: 0.25,
  width: 10,
  height: 10
});

dotCursor.inner.classList.add("dot-cursor");

dotCursor.attachHover({
  element: document.querySelector(".js-snap"),
  width: 16,
  height: 16,
  snap: true
});

dotCursor.attachHover({
  element: document.querySelector(".js-sticky"),
  width: 16,
  height: 16,
  snap: true,
  sticky: true,
  stickyAmplitude: {
    x: 0,
    y: 20
  }
});

dotCursor.attachHover({
  element: document.querySelector(".js-friction"),
  width: 16,
  height: 16,
  sticky: true,
  stickyFriction: 0.5
});

  </script>
      </body>
    </html>
