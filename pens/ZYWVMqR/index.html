<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · ZYWVMqR</title>
        <style>body {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;

  height: 100vh;
  width: 100%;
  overflow: hidden;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
}

.item {
  width: 80px;
  height: 80px;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 10px;
  background-color: #000;

  font-size: 12px;

  img {
    width: 40px;
    height: auto;
    filter: invert(100%);
  }
}</style>
      </head>
      <body>
        <div id="horizontal" class="item" style="background: linear-gradient(90deg, rgb(13, 110, 253) 0%, rgb(140, 122, 230) 50%, rgb(0, 201, 177) 100%);">
  <img src="https://www.svgrepo.com/show/379996/drag-horizontal.svg" alt="">
</div>
        
  <script type="module">
import {
  Swipe
} from "https://esm.sh/vevet@5";

new Swipe({
  container: document.getElementById("horizontal"),
  axis: "x",
  grabCursor: true,
  onMove: ({
    diff
  }, {
    container
  }) => {
    container.style.transition = "";
    container.style.transform = `translate(${diff.x}px, 0)`;
  },
  onEnd: (data, {
    container
  }) => {
    container.style.zIndex = "";
    container.style.transition = "transform 0.25s";
    container.style.transform = "none";
  }
});

  </script>
      </body>
    </html>
