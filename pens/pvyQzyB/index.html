<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · pvyQzyB</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.fullpage-center {
  align-items: start;
  padding: 0 1.5rem;
}

#quote {
  width: 20em;
  max-width: 100%;
  line-height: 1.2;
  font-kerning: none;

  opacity: 0;
}

.ignore {
  display: inline-block;
}</style>
      </head>
      <body>
        <div class="fullpage-center" dir="rtl">
  <div id="quote"><span class="ignore">vevet.js</span> بسيط جدًا! أحبه!</div>

  <button type="button" id="animate" class="btn">Animate</button>
</div>
        
  <script type="module">
import {
  SplitText
} from "https://esm.sh/vevet@5";
import {
  animate,
  stagger
} from "https://esm.sh/animejs@4";

let tl;
const container = document.getElementById("quote");
const segmenter = new Intl.Segmenter("ar", {
  granularity: "word"
});

const splitText = new SplitText({
  container,
  ignore: ".ignore",
  prepareText: (source) => [...segmenter.segment(source)].map(s => s.segment).join(" "),
  onSplit: (data, {
    words
  }) => {
    container.style.opacity = "1";

    tl = animate(words, {
      duration: 350,
      opacity: {
        from: 0,
        to: 1
      },
      ease: "outSine",
      delay: stagger(250),
      y: {
        from: "-100%",
        to: 0
      }
    });

  }
});

document.getElementById("animate").onclick = function() {
  tl?.restart();
};

  </script>
      </body>
    </html>
