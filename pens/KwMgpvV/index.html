<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · KwMgpvV</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.selector {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}

.carousel {
  position: relative;
  width: 3rem;
  height: 2.25rem;

  opacity: 0;
  transition: opacity 0.25s linear;

  transform-style: preserve-3d;
  perspective: 4rem;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="selector">
    <div class="carousel" id="hours"></div>
    :
    <div class="carousel" id="minutes"></div>
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  clamp,
  scoped
} from "https://esm.sh/vevet@5";

function createSelect(container, max) {
  for (let i = 0; i < max; i += 1) {
    const slide = document.createElement("div");
    slide.classList.add("slide");
    container.append(slide);

    slide.innerHTML = `${i}`.padStart(2, "0");
  }

  const carousel = new Snap({
    container,
    gap: 0,
    direction: "vertical",
    loop: true,
    origin: "center",
    freemode: "sticky",
    wheel: true,
    grabCursor: true,
    swipeInertiaRatio: 0.6,
    shortSwipes: false
  });

  container.classList.add("ready");

  carousel.on("update", () => {
    carousel.slides.forEach(({
      element,
      coord,
      isVisible,
      progress
    }) => {
      const rotateX = progress * 20;
      const z = Math.abs(progress) * -0.5;
      const opacity = 1 - clamp(Math.abs(scoped(progress, 0, 2.5)));

      element.style.transform = `translate(0, ${coord}px) rotateX(${rotateX}deg) translateZ(${z}rem)`;
      element.style.opacity = opacity;
    });
  });
}

createSelect(document.getElementById("hours"), 24);
createSelect(document.getElementById("minutes"), 60);

  </script>
      </body>
    </html>
