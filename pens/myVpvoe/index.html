<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · myVpvoe</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.carousel {
  --size: min(40vw, 40svh);

  position: relative;
  width: 100%;
  height: var(--size);

  opacity: 0;
  transition: opacity 0.25s linear;
}

.carousel.ready {
  opacity: 1;
}

.slide {
  position: absolute;
  width: calc(var(--size) * 0.6);
  height: var(--size);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0px 0px 50px 0px rgba(0, 0, 0, 0.1);
}

.slide img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div class="carousel" id="carousel">
    <div class="slide">
      <img src="https://picsum.photos/id/757/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/59/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/400/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/260/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/358/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/478/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/625/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/356/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/380/600/900" alt="">
    </div>
    <div class="slide">
      <img src="https://picsum.photos/id/652/600/900" alt="">
    </div>
  </div>
</div>
        
  <script type="module">
import {
  Snap,
  vevet
} from "https://esm.sh/vevet@5";

const container = document.getElementById("carousel");

const carousel = new Snap({
  container,
  direction: "horizontal",
  grabCursor: true,
  origin: "center",
  loop: true,
  freemode: "sticky",
  shortSwipes: false
});

carousel.on("update", () => {
  carousel.slides.forEach(({
    element,
    coord,
    progress
  }) => {
    const absGap = Math.abs(progress) * -20;
    const gap = progress * absGap;

    element.style.transform = `translateX(${coord + gap}px)`;
  });
});

container.classList.add("ready");

  </script>
      </body>
    </html>
