<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · qEZLMLz</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.item {
  width: 2.5rem;
  height: 2.5rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;

  border-radius: 0.5rem;
  background-color: #000;

  img {
    width: 1.25rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="rotation" class="item" style="background: linear-gradient(35deg, rgb(255, 127, 135) 0%, rgb(244, 214, 157) 100%);">
    <img src="https://www.svgrepo.com/show/533709/rotate.svg" alt="">
  </div>
</div>
        
  <script type="module">
import {
  Swipe
} from "https://esm.sh/vevet@5";

new Swipe({
  container: document.getElementById("rotation"),
  relative: true,
  grabCursor: true,
  onMove: ({
    diff
  }, {
    container
  }) => {
    container.style.transition = "";
    container.style.transform = `rotate(${diff.angle}deg)`;
  },
  onEnd: (data, {
    container
  }) => {
    container.style.transition = "transform 0.25s";
    container.style.transform = "none";
  }
});

  </script>
      </body>
    </html>
