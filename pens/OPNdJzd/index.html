<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · OPNdJzd</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
  color: #fff;
}

.container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  touch-action: none;
}

.thumb {
  position: absolute;
  top: -25px;
  left: -25px;
  width: 50px;
  height: 50px;
  border-radius: 50%;

  opacity: 0;
}</style>
      </head>
      <body>
        <div class="container" id="container">
  Place Your Fingers Here

  <div class="thumb" style="background: linear-gradient(
  165deg,
  rgb(255, 140, 80) 0%,
  rgb(255, 95, 88) 40%,
  rgb(255, 60, 140) 100%
)"></div>

  <div class="thumb" style=" background: linear-gradient(
  165deg,
  rgb(70, 30, 120) 0%,
  rgb(120, 45, 180) 40%,
  rgb(200, 60, 255) 100%
)"></div>

  <div class="thumb" style=" background: linear-gradient(
  165deg,
  rgb(110, 200, 40) 0%,
  rgb(40, 160, 80) 40%,
  rgb(0, 100, 60) 100%
)"></div>

  <div class="thumb" style=" background: linear-gradient(
  165deg,
  rgb(255, 200, 60) 0%,
  rgb(255, 150, 40) 40%,
  rgb(220, 60, 40) 100%
)"></div>

  <div class="thumb" style="background: linear-gradient(
  165deg,
  rgb(150, 220, 255) 0%,
  rgb(80, 200, 255) 40%,
  rgb(0, 170, 200) 100%
)"></div>
</div>
        
  <script type="module">
import {
  Pointers
} from "https://esm.sh/vevet@5";

const container = document.getElementById("container");

const thumbs = document.querySelectorAll(".thumb");

new Pointers({
    container,
    relative: true,
    minPointers: 2,
    maxPointers: 5
  },

  {
    onPointermove: ({
      pointer
    }) => {
      const finger = thumbs[pointer.index];

      finger.style.opacity = "1";
      finger.style.transform = `translate(${pointer.current.x}px, ${pointer.current.y}px)`;
    },
    onPointerup: ({
      pointer
    }) => {
      const finger = thumbs[pointer.index];

      finger.style.opacity = "0";
    },
    onStart: () => {
      container.style.backgroundColor = "#ccc";
    },
    onEnd: () => {
      container.style.backgroundColor = "";
    }
  });

  </script>
      </body>
    </html>
