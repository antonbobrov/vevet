<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · OPNdJzd</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  touch-action: none;
}

.thumb {
  position: absolute;
  top: -25px;
  left: -25px;
  width: 50px;
  height: 50px;
  border-radius: 50%;

  opacity: 0;
}

.thumb:nth-child(1) {
  background: var(--gradient-sunset, #000);
}

.thumb:nth-child(2) {
  background: var(--gradient-violet, #000);
}

.thumb:nth-child(3) {
  background: var(--gradient-green, #000);
}

.thumb:nth-child(4) {
  background: var(--gradient-amber, #000);
}

.thumb:nth-child(5) {
  background: var(--gradient-sky, #000);
}</style>
      </head>
      <body>
        <div class="container" id="container">
  Place Your Fingers Here

  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
  <div class="thumb"></div>
</div>
        
  <script type="module">
import {
  Pointers
} from "https://esm.sh/vevet@5";

const container = document.getElementById("container");

const thumbs = document.querySelectorAll(".thumb");

new Pointers({
    container,
    relative: true,
    minPointers: 2,
    maxPointers: 5
  },

  {
    onPointermove: ({
      pointer
    }) => {
      const finger = thumbs[pointer.index];

      finger.style.opacity = "1";
      finger.style.transform = `translate(${pointer.current.x}px, ${pointer.current.y}px)`;
    },
    onPointerup: ({
      pointer
    }) => {
      const finger = thumbs[pointer.index];

      finger.style.opacity = "0";
    },
    onStart: () => {
      container.style.backgroundColor = "rgb(10, 23, 62)";
    },
    onEnd: () => {
      container.style.backgroundColor = "";
    }
  });

  </script>
      </body>
    </html>
