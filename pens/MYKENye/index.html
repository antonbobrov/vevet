<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · MYKENye</title>
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0 30px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
}

#quote {
  font-size: 30px;
  max-width: 20em;
  text-align: center;
  line-height: 1.2;
  font-kerning: none;
}

#quote .v-split-text__letter {
  &:nth-child(2n + 1) {
    background-color: rgba(0, 201, 177, 0.2);
  }
}

#quote code {
  background-color: rgba(255, 255, 255, 0.2);
}

.ignore-me {
  background-color: rgba(125, 0, 50, 1);
}</style>
      </head>
      <body>
        <div id="quote">
  In some cases, you might prefer not to split specific elements. That's perfectly fine - we support that. Just add <code>ignore</code> and <b class="ignore-me">&nbsp;this text will never be split!</b>
</div>
        
  <script type="module">
import {
  SplitText
} from "https://esm.sh/vevet@5";

const splitText = new SplitText({
  container: document.getElementById("quote"),
  letters: true,
  ignore: ".ignore-me"
});

  </script>
      </body>
    </html>
