<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · bNpOmGo</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>.item {
  position: relative;
  width: 6rem;
  height: 6rem;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  background: var(--gradient-sunset, #000);

  img {
    width: 2rem;
    height: auto;
    filter: invert(100%);
    background: transparent;
  }
}

.thumb {
  position: absolute;
  top: -0.6rem;
  left: calc(50% - 0.6rem);
  width: 1.2rem;
  height: 1.2rem;
  background: var(--gradient-brand-0, #000);
  border-radius: 50%;
  cursor: grab;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="rotation" class="item">
    <img src="https://www.svgrepo.com/show/533709/rotate.svg" alt="">

    <div id="thumb" class="thumb"></div>
  </div>
</div>
        
  <script type="module">
import {
  Swipe
} from "https://esm.sh/vevet@5";

let angle = 0;

new Swipe({
  container: document.getElementById("rotation"),
  thumb: document.getElementById("thumb"),
  inertia: true,
  relative: true,
  onMove: ({
    step
  }, {
    container
  }) => {
    angle += step.angle;

    container.style.transform = `rotate(${angle}deg)`;
  }
});

  </script>
      </body>
    </html>
