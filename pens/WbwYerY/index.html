<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · WbwYerY</title>
        <style>#quote {
  width: 20em;
  max-width: 100%;
  font-size: 1.5rem;
  line-height: 1.2;
  text-align: center;
  font-kerning: none;

  opacity: 0;
}

.ignore {
  display: inline-block;
}</style>
      </head>
      <body>
        <div class="fullpage-center">
  <div id="quote"><span class="ignore">vevet.js</span> เรียบง่ายมาก ฉันชอบมันมาก!</div>

  <button type="button" id="animate" class="btn">Animate</button>
</div>
        
  <script type="module">
import {
  SplitText
} from "https://esm.sh/vevet@5";
import {
  animate,
  stagger
} from "https://esm.sh/animejs@4";

let tl;
const container = document.getElementById("quote");
const segmenter = new Intl.Segmenter("th", {
  granularity: "word"
});

const splitText = new SplitText({
  container,
  ignore: ".ignore",
  prepareText: (source) => [...segmenter.segment(source)].map(s => s.segment).join(" "),
  onSplit: (data, {
    words
  }) => {
    container.style.opacity = "1";

    tl = animate(words, {
      duration: 350,
      opacity: {
        from: 0,
        to: 1
      },
      ease: "outSine",
      delay: stagger(250),
      y: {
        from: "-100%",
        to: 0
      }
    });

  }
});

document.getElementById("animate").onclick = function() {
  tl?.restart();
};

  </script>
      </body>
    </html>
