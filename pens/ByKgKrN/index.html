<!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vevet pen · ByKgKrN</title>
        <link rel="stylesheet" href="https://vevetjs.com/shared/codepen-styles.css" />
        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;

  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;

  background: rgb(30, 43, 82);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  text-align: center;
  font-size: 30px;
}

.v-cursor__inner {
  background-color: transparent !important;
  border: 2px solid #fff;
  border-radius: 50%;
}

.v-cursor__inner.fill {
  background-color: #fff !important;
}

h1 {
  font-size: 40px;
  font-weight: 600;
}

svg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

svg path {
  fill: transparent;
  stroke-width: 4px;
  stroke: rgba(255, 255, 255, 0.5);
}</style>
      </head>
      <body>
        <h1>Move Your Cursor</h1>

<svg></svg>
        
  <script type="module">
import {
  Cursor
} from "https://esm.sh/vevet@5";

const pathCursor = new Cursor({
  lerp: 0.05,
  behavior: "path" // comment this line to see difference
});

const svg = document.querySelector("svg");
svg.append(pathCursor.path);

const instantCursor = new Cursor({
  lerp: 1,
  width: 20,
  height: 20
});

instantCursor.inner.classList.add("fill");

  </script>
      </body>
    </html>
