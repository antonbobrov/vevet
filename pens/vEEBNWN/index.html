<!DOCTYPE html>

        <style>@import url("https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap");

body {
  margin: 0;
  padding: 0 10px;

  background: linear-gradient(165deg,
      rgb(17, 25, 42) 0%,
      rgb(30, 43, 82) 40%,
      rgb(0, 58, 82) 100%);
  color: #fff;

  font-family: "Ubuntu", sans-serif;
  font-size: 30px;
}

.v-cursor__inner {
  background-color: transparent;
  border-radius: 50vw;
}

[data-cursor="default"] {
  width: var(--cursor-w);
  height: var(--cursor-h);
  border-radius: inherit;
  border: 2px solid rgba(255, 255, 255, 0.35);
  box-sizing: border-box;
}

[data-cursor="draggable"],
[data-cursor="zoom"],
[data-cursor="play"],
[data-cursor="sticky"],
[data-cursor="friction"] {
  width: var(--cursor-w);
  height: var(--cursor-h);
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  border-radius: inherit;
  background: linear-gradient(35deg,
      rgb(255, 127, 135) 0%,
      rgb(244, 214, 157) 100%);
  color: #000;

  svg {
    max-width: 40%;
    width: 25px;
    height: auto;
  }
}

[data-cursor="play"] {
  svg {
    transform: translate(5%, 0);
  }
}

h1 {
  margin: 30px 0;
  font-size: 40px;
  font-weight: 600;
  text-align: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;

  .grid {
    width: 600px;
    max-width: 100%;
  }
}

.grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.item {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  padding: 30px;
  border-radius: 10px;
  font-size: 20px;
  background: rgba(255, 255, 255, 0.1);
  color: #fff;

  transition: color 1s, background-color 1s;

  &:hover {
    background-color: rgba(255, 255, 255, 0.15);
  }

  &:nth-child(1),
  &:nth-child(2) {
    grid-row: span 2;
  }
}</style>
      </head>
      <body>
        <div class="container">
  <h1>Custom Cursor</h1>

  <div class="grid">
    <div class="item" data-cursor-type="sticky" data-cursor-sticky>Sticky</div>

    <div class="item" data-cursor-type="friction" data-cursor-friction>Friction</div>

    <div class="item" data-cursor-snap>Snap</div>

    <div class="item" data-cursor-size>Custom size</div>

    <div class="item" data-cursor-type="draggable">Draggable</div>

    <div class="item" data-cursor-type="zoom">Zoom</div>

    <div class="item" data-cursor-type="play">Watch</div>
  </div>
</div>



<div class="cursor" data-cursor="default"></div>

<div class="cursor" data-cursor="sticky"></div>

<div class="cursor" data-cursor="friction"></div>

  <script type="module">
import {
  Cursor
} from "https://esm.sh/vevet@5";

const cursor = new Cursor({
  lerp: 0.2,
  width: 30,
  height: 30
});

cursor.attachHover({
  element: document.body,
  type: "default"
});

const cursorOuters = document.querySelectorAll("*[data-cursor]");
cursorOuters.forEach(element => {
  cursor.attachCursor({
    element,
    type: element.getAttribute("data-cursor")
  });

});

const elements = document.querySelectorAll("*[data-cursor-type]");
elements.forEach(element => {
  cursor.attachHover({
    element,
    type: element.getAttribute("data-cursor-type"),
    width: 75,
    height: 75
  });

});

const sticky = document.querySelectorAll("[data-cursor-sticky]");
sticky.forEach(element => {
  cursor.attachHover({
    element,
    snap: true,
    width: 20,
    height: 20,
    sticky: true,
    stickyAmplitude: {
      x: 0,
      y: "20px"
    }
  });

});

const friction = document.querySelectorAll("[data-cursor-friction]");
friction.forEach(element => {
  cursor.attachHover({
    element,
    width: 20,
    height: 20,
    sticky: true,
    stickyFriction: 0.8
  });

});

const customSize = document.querySelectorAll("[data-cursor-size]");
customSize.forEach(element => {
  cursor.attachHover({
    element,
    width: 100,
    height: 100
  });

});

const snap = document.querySelectorAll("[data-cursor-snap]");
snap.forEach(element => {
  cursor.attachHover({
    element,
    snap: true,
    width: "auto",
    height: "auto"
  });

});

  </script>
